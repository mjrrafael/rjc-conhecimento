skill: revisar-ate-concluir
versao_contrato: 2026-07-15
dominio: monitoramento_tributario
risco_padrao: alto
decisoes_permitidas:
  - AUTORIZAR_PUBLICACAO
  - MANTER_QUARENTENA_SEGURA
  - NAO_APROVAR_PUBLICACAO
decisao_positiva: AUTORIZAR_PUBLICACAO
decisao_inconclusiva: MANTER_QUARENTENA_SEGURA

artefatos_obrigatorios:
  - workflow.md
  - ledger_verificacao.csv
  - fontes_lidas.csv
  - inventario_documentos.csv
  - achados_e_pendencias.md
  - revisao_adversarial.md
  - relatorio_final.md
  - conformidade.json

gates:
  - id: G0
    nome: enquadramento_e_escopo
    artefatos: [workflow.md]
  - id: G1
    nome: fontes_e_inventario
    artefatos: [fontes_lidas.csv, inventario_documentos.csv]
  - id: G2
    nome: execucao_com_evidencia
    artefatos: [ledger_verificacao.csv, achados_e_pendencias.md]
  - id: G3
    nome: revisao_adversarial
    artefatos: [revisao_adversarial.md, subagents.json]
  - id: G4
    nome: verificador_deterministico
    artefatos: [conformidade.json]
  - id: G5
    nome: fechamento_literal
    artefatos: [relatorio_final.md]

checks_obrigatorios:
  - "RAC-001 | Definir criterios falsificaveis antes de executar."
  - "RAC-002 | Registrar ledger com status permitido e evidencia concreta existente."
  - "RAC-003 | Executar revisao adversarial real com marcador 'cadeia re-derivada:' e fonte primaria crua."
  - "RAC-004 | Conferir o detalhe interno que sustenta resumo, subtotal, dashboard ou relatorio sintetico."
  - "RAC-005 | Fechar com linha explicita Status: CONCLUIDO, CONCLUIDO COM RESSALVA, A VALIDAR ou BLOQUEADO."

camadas_manuais:
  - "Re-derivacao da superficie publicada, matriz de fontes e dados de cards a partir de arquivos/HTTP crus."
  - "Cobertura adversarial: toda URL juridica servida fora da projeção segura derruba a decisao."
  - "Recibos nativos, raizes de confianca e prova negativa de independencia permanecem bloqueios externos."
