name: portal-audit

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  portal-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
      - name: Compile Python
        run: PYTHONPYCACHEPREFIX=/tmp/rjc-pycache python -m compileall -q scripts
      - name: Install GitHub Pages toolchain
        run: gem install github-pages -v 232 --no-document
      - name: Build exact Pages projection
        run: jekyll build --source . --destination "$RUNNER_TEMP/portal-site"
      - name: Audit every emitted and excluded surface
        run: python scripts/audit_safe_pages_projection.py "$RUNNER_TEMP/portal-site"
      - name: Reject property-directed unsafe mutations
        run: python -B scripts/test_safe_pages_projection_gate.py "$RUNNER_TEMP/portal-site"
      - name: Reject impossible dates and hollow provenance
        run: python -B scripts/test_validated_benefits_fail_closed.py
      - name: Enforce material v3 candidate gates
        if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          python -B scripts/audit_v3_readiness.py
          python -B scripts/audit_field_provenance.py
          python -B scripts/audit_no_synthetic_legal_dates.py
          python -B scripts/audit_verification_receipts.py
          python -B scripts/audit_http_platform_receipts.py
          python -B scripts/audit_link_receipts.py
          python -B scripts/audit_internalization_evidence.py
          python -B scripts/audit_full_content_coverage.py
          python -B scripts/audit_canonical_source_scope.py
          python -B scripts/audit_public_set_algebra.py
          python -B scripts/audit_quarantine_fingerprints.py
          python -B scripts/audit_subagent_independence.py
      - name: Rebuild and verify inventory freshness
        run: |
          python scripts/monitor_v3_inventory.py
          git diff --exit-code
      - name: Diff hygiene
        run: git diff --check
